# Hybrid Dataset Configuration for Ultralytics YOLO

# Combined train path (symlinks to both datasets)
train: /datasets/hybrid_combined/images/train/
val: /datasets/hybrid_combined/images/val/

# Class configuration
nc: 1
names: ['person']

# Dataset balancing metadata (for custom sampler)
dataset_weights:
  crowdhuman: 0.5
  merl: 0.5

# Augmentation configuration
augmentation:
  mosaic: 1.0
  mixup: 0.5
  copy_paste: 0.3
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  shear: 2.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  bgr: 0.0
  copy_paste_mode: random